  # cs.AI=Artificial Intelligence, stat.ML=Statistics/ML)
  categories: ["cs.LG", "cs.CL", "cs.AI", "stat.ML"]
  keywords: ["data extraction", "large language model", "LLM training", "data analytics"]
  max_results: 150
  days_back: 60

target:
